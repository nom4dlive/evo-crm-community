version: '3.8'

services:
  evolution-go:
    image: evoapicloud/evolution-go:latest
    container_name: evolution-go
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      SERVER_PORT: 4000
      CLIENT_NAME: "evolution"
      GLOBAL_API_KEY: "f8d8b13d-5c17-4952-b8d1-12c5b3644917" # Generated API Key

      POSTGRES_AUTH_DB: "postgresql://postgres:EvoAdminVPS2026!@postgres:5432/evogo_auth?sslmode=disable"
      POSTGRES_USERS_DB: "postgresql://postgres:EvoAdminVPS2026!@postgres:5432/evogo_users?sslmode=disable"
      DATABASE_SAVE_MESSAGES: "false"

      WADEBUG: "INFO"
      LOGTYPE: "console"
      CONNECT_ON_STARTUP: "false"
      WEBHOOK_FILES: "true"

    volumes:
      - evolution_data:/app/dbdata
      - evolution_logs:/app/logs
    networks:
      - evolution_network
      - traefik_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.evolution-go.rule=Host(`crm-api.bodyharmony.tech`)"
      - "traefik.http.routers.evolution-go.entrypoints=websecure"
      - "traefik.http.routers.evolution-go.tls.certresolver=letsencrypt"
      - "traefik.http.services.evolution-go.loadbalancer.server.port=4000"
    depends_on:
      - postgres

  evo-auth:
    image: evoapicloud/evo-auth-service-community:latest
    container_name: evo-auth
    volumes:
      - ./evo-auth-service-community:/app
      - ./evo-auth-service-community:/rails
      - ./shared:/shared
    command: ["bash", "-c", "bundle exec rails db:create && bundle exec rails db:migrate && bundle exec rails server -p 3001 -b 0.0.0.0"]
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      RAILS_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: EvoAdminVPS2026!
      POSTGRES_DATABASE: evogo_auth
      REDIS_URL: redis://redis:6379/1
      RAILS_LOG_TO_STDOUT: "true"
      SECRET_KEY_BASE: "b45579308e2ec1b95b866c1b354238e5628b056157e3f282470a1a51152a537f"
      DOORKEEPER_JWT_SECRET_KEY: "b45579308e2ec1b95b866c1b354238e5628b056157e3f282470a1a51152a537f"
      EVOLUTION_OPERATOR_EMAIL: "admin@seudominio.com"
      EVOAI_CRM_API_TOKEN: "f8d8b13d-5c17-4952-b8d1-12c5b3644917"
      # S2S secret shared with evo-billing-service — Ref: Spec P2-AC-04
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
    depends_on:
      - postgres
      - redis
    networks:
      - evolution_network
      - traefik_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.evo-auth.rule=Host(`auth-api.bodyharmony.tech`)"
      - "traefik.http.routers.evo-auth.entrypoints=websecure"
      - "traefik.http.routers.evo-auth.tls.certresolver=letsencrypt"
      - "traefik.http.services.evo-auth.loadbalancer.server.port=3001"

  frontend:
    image: nginx:alpine
    container_name: frontend
    restart: unless-stopped
    volumes:
      - /var/www/crm:/usr/share/nginx/html:ro
    networks:
      - traefik_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`crm.bodyharmony.tech`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - evolution_network

  # evo-billing-service: Financial management microservice
  # Ref: ADR-003, Spec P1-AC-12
  evo-billing:
    build:
      context: ./evo-billing-service
      dockerfile: Dockerfile
    container_name: evo-billing
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      RAILS_ENV: production
      DATABASE_URL: postgresql://postgres:EvoAdminVPS2026!@billing-db:5432/evo_billing_production
      REDIS_URL: redis://redis:6379/2
      RAILS_LOG_TO_STDOUT: "true"
      SECRET_KEY_BASE: "CHANGE_ME_BILLING_SECRET_KEY_BASE"
      # JWT public key from evo-auth (Doorkeeper) — set in .env
      EVO_AUTH_JWT_PUBLIC_KEY: ${EVO_AUTH_JWT_PUBLIC_KEY}
      # Internal S2S secret for suspend/unsuspend calls to evo-auth — Ref: Spec C-04
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      EVO_AUTH_INTERNAL_URL: http://evo-auth:3001
    depends_on:
      - billing-db
      - redis
    networks:
      - evolution_network
      - traefik_default
    labels:
      - "traefik.enable=true"
      # Route /billing/* to evo-billing service — Ref: ADR-003 D7, Spec P1-AC-12
      - "traefik.http.routers.evo-billing.rule=Host(`crm.bodyharmony.tech`) && PathPrefix(`/billing/`)"
      - "traefik.http.routers.evo-billing.entrypoints=websecure"
      - "traefik.http.routers.evo-billing.tls.certresolver=letsencrypt"
      - "traefik.http.services.evo-billing.loadbalancer.server.port=3002"
      # Strip /billing prefix before forwarding to Rails
      - "traefik.http.middlewares.billing-strip.stripprefix.prefixes=/billing"
      - "traefik.http.routers.evo-billing.middlewares=billing-strip"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Dedicated Sidekiq worker for evo-billing background jobs — Ref: Spec P2-AC-04
  evo-billing-sidekiq:
    build:
      context: ./evo-billing-service
      dockerfile: Dockerfile
    container_name: evo-billing-sidekiq
    restart: unless-stopped
    command: ["bundle", "exec", "sidekiq", "-q", "billing", "-q", "default"]
    environment:
      RAILS_ENV: production
      DATABASE_URL: postgresql://postgres:EvoAdminVPS2026!@billing-db:5432/evo_billing_production
      REDIS_URL: redis://redis:6379/2
      RAILS_LOG_TO_STDOUT: "true"
      SECRET_KEY_BASE: "CHANGE_ME_BILLING_SECRET_KEY_BASE"
      EVO_AUTH_JWT_PUBLIC_KEY: ${EVO_AUTH_JWT_PUBLIC_KEY}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      EVO_AUTH_INTERNAL_URL: http://evo-auth:3001
      ASAAS_API_KEY: ${ASAAS_API_KEY}
      ASAAS_WEBHOOK_SECRET: ${ASAAS_WEBHOOK_SECRET}
    depends_on:
      - billing-db
      - redis
      - evo-auth
    networks:
      - evolution_network

  # Dedicated billing database — isolated from evogo_auth — Ref: ADR-003 D2, Spec P1-AC-02
  billing-db:
    image: postgres:15-alpine
    container_name: billing-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: EvoAdminVPS2026!
      POSTGRES_DB: evo_billing_production
    volumes:
      - billing_db_data:/var/lib/postgresql/data
    networks:
      - evolution_network
    # NOT exposed to Traefik — internal only (Spec C-04)

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: EvoAdminVPS2026!
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - evolution_network

volumes:
  evolution_data:
  evolution_logs:
  postgres_data:
  billing_db_data:

networks:
  evolution_network:
    driver: bridge
  traefik_default:
    external: true
